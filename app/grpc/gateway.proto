syntax = "proto3";

package gateway.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING     = 1;
  JOB_STATUS_PROCESSING  = 2;
  JOB_STATUS_COMPLETED   = 3;
  JOB_STATUS_FAILED      = 4;
  JOB_STATUS_CANCELLED   = 5;
}

message JobMessage {
  string id                              = 1;
  JobStatus status                       = 2;
  string document_name                   = 3;
  string document_type                   = 4;
  repeated string pipeline_config        = 5;
  google.protobuf.Struct partial_results = 6;
  string error_message                   = 7;
  google.protobuf.Timestamp created_at   = 8;
  google.protobuf.Timestamp updated_at   = 9;
}

message SubmitDocumentRequest {
  string document_name            = 1;
  string document_type            = 2;
  string document_content         = 3;
  repeated string pipeline_config = 4;
}

message SubmitDocumentResponse {
  JobMessage job = 1;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  JobMessage job = 1;
}

service DocumentGateway {
  rpc SubmitDocument (SubmitDocumentRequest) returns (SubmitDocumentResponse);
  rpc GetJobStatus   (GetJobStatusRequest)   returns (GetJobStatusResponse);
}
